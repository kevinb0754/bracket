volumes:
  bracket-postgres-data:
  bracket_static_data:

services:
  bracket:
    container_name: bracket
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ENVIRONMENT=PRODUCTION
      - PG_DSN=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTO_RUN_MIGRATIONS=true
      - SERVE_FRONTEND: true
      - API_PREFIX: '/api'
    image: ghcr.io/evroon/bracket
    ports:
      - 8400:8400
    restart: unless-stopped
    volumes:
      - bracket_static_data:/app/static

  postgres:
    image: 'postgres:16-alpine'
    container_name: bracket-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - bracket-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
